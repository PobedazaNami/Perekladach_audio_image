name: Deploy to Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Google Cloud credentials file
        run: |
          mkdir -p credentials
          echo "${{ secrets.GCP_CREDENTIALS }}" > credentials/vision-api-key.json

      - name: Create .env file from all secrets
        run: |
          echo "MONGODB_URI=${{ secrets.MONGODB_URI }}" > .env
          echo "MONGODB_DATABASE=translation_bot" >> .env
          echo "GOOGLE_APPLICATION_CREDENTIALS=credentials/vision-api-key.json" >> .env
          echo "ADMIN_IDS=${{ secrets.ADMIN_IDS }}" >> .env
          echo "CACHE_TTL_HOURS=${{ secrets.CACHE_TTL_HOURS }}" >> .env
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env
          echo "REDIS_PUBLIC_URL=${{ secrets.REDIS_PUBLIC_URL }}" >> .env
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env
      
      - name: Build and run Docker containers
        run: |
          docker compose -f docker-compose.prod.yml down
          docker compose -f docker-compose.prod.yml build
          docker compose -f docker-compose.prod.yml up -d