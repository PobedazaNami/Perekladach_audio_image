version: '3.8'

services:
  translation_bot:
    build: .
    container_name: translation_bot_app
    restart: unless-stopped
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MONGODB_URI=${MONGODB_URI}
      - MONGODB_DATABASE=${MONGODB_DATABASE}
      - REDIS_URL=redis://translation_redis:6379/0
      - ADMIN_IDS=${ADMIN_IDS}
      - GOOGLE_APPLICATION_CREDENTIALS=credentials/vision-api-key.json
    volumes:
      - ./credentials:/app/credentials:ro
      - ./logs:/app/logs
    depends_on:
      - translation_redis
    networks:
      - translation_network

  translation_redis:
    image: redis:7-alpine
    container_name: translation_redis_cache
    restart: unless-stopped
    ports:
      - "6380:6379" # Используем порт 6380 чтобы не конфликтовать с другим Redis
    volumes:
      - translation_redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    networks:
      - translation_network

volumes:
  translation_redis_data:


networks:
  translation_network:
    driver: bridge
